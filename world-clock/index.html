<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Votonシンプル世界時計</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .clock-container { display: flex; gap: 20px; }
        .clock-card { border: 1px solid #ccc; padding: 15px; border-radius: 8px; min-width: 150px; }
        .time { font-size: 1.5rem; font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <h1>世界時計</h1>

    <div class="clock-container">
        <!-- 東京 -->
        <div class="clock-card">
            <div>東京 (日本)</div>
            <div id="clock-tokyo" class="time">--:--:--</div>
        </div>

        <!-- ニューヨーク -->
        <div class="clock-card">
            <div>ニューヨーク (アメリカ)</div>
            <div id="clock-ny" class="time">--:--:--</div>
        </div>
    </div>

    <script>
        function updateClocks() {
            const now = new Date();

            // 日本時間
            const tokyoTime = now.toLocaleTimeString('ja-JP', { timeZone: 'Asia/Tokyo' });
            document.getElementById('clock-tokyo').textContent = tokyoTime;

            // ニューヨーク時間
            const nyTime = now.toLocaleTimeString('ja-JP', { timeZone: 'America/New_York' });
            document.getElementById('clock-ny').textContent = nyTime;
        }

        // 1秒ごとに更新
        setInterval(updateClocks, 1000);
        updateClocks(); // 初回実行
    </script>

</body>
</html>
