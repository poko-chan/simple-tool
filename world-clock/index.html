<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voton World Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="clock-wrapper">
        <h1>WORLD CLOCK</h1>
        
        <div class="selector-container">
            <select id="city-selector">
                <option value="Asia/Tokyo">東京 (日本)</option>
                <option value="America/New_York">ニューヨーク (アメリカ)</option>
                <option value="Europe/London">ロンドン (イギリス)</option>
                <option value="Europe/Paris">パリ (フランス)</option>
                <option value="Asia/Singapore">シンガポール</option>
                <option value="Australia/Sydney">シドニー (オーストラリア)</option>
                <option value="America/Los_Angeles">ロサンゼルス (アメリカ)</option>
            </select>
        </div>

        <div class="clock-card">
            <div id="city-name" class="label">TOKYO</div>
            <div id="clock-display" class="time">00:00:00</div>
            <div id="date-display" class="date">2024.01.01</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
